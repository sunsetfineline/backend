<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunset Tattoo — Gestión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root, [data-theme="dark"]{
  --bg:#19191b;
  --bg-elev:#232326;
  --bg-elev-2:#2c2c30;
  --border:#3a3a3e;
  --text:#ececee;
  --text-muted:#9a9aa0;
  --text-faint:#95959b;
  --accent:#d97a3f;
  --accent-soft:#e8a06a;
  --accent-dim:#3a2c22;
  --good:#7fa583;
  --good-dim:#243024;
  --bad:#d47870;
  --bad-dim:#301f1d;
  --radius:10px;
  --font-family: Calibri, Candara, "Segoe UI", Optima, Arial, sans-serif;
  --hero-glow: rgba(217,122,63,0.10);
}
[data-theme="light"]{
  --bg:#f2f2f4;
  --bg-elev:#ffffff;
  --bg-elev-2:#f6f6f8;
  --border:#e1e1e5;
  --text:#212124;
  --text-muted:#6c6c72;
  --text-faint:#707076;
  --accent:#c96a34;
  --accent-soft:#a85528;
  --accent-dim:#faf0e4;
  --good:#3f7a4c;
  --good-dim:#e2f0e4;
  --bad:#b03d33;
  --bad-dim:#f6e0dd;
  --radius:10px;
  --hero-glow: rgba(201,106,52,0.08);
}
*{box-sizing:border-box; margin:0; padding:0;}
html{ transition:background .2s ease; }
body{
  background:
    radial-gradient(1200px 500px at 80% -10%, var(--hero-glow), transparent 60%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
  font-family: var(--font-family);
  -webkit-font-smoothing:antialiased;
  transition:background .2s ease, color .2s ease;
}
button, input, select, textarea{ font-family:inherit; }
::selection{ background:var(--accent); color:#1a1208; }

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px;
}
.login-card{
  width:100%; max-width:360px;
  background:var(--bg-elev);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:36px 32px;
  text-align:center;
}
.brand-mark{
  width:52px;height:52px;margin:0 auto 18px;border-radius:50%;
  background:linear-gradient(140deg,var(--accent),#8a4a2a);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 1px rgba(255,255,255,0.06), 0 8px 24px -8px rgba(217,122,63,0.5);
}
.brand-mark svg{width:26px;height:26px;stroke:#1a1208;}
.login-card h1{ font-size:20px; font-weight:600; letter-spacing:0.02em; margin-bottom:2px;}
.login-card .sub{ color:var(--text-muted); font-size:13px; margin-bottom:26px;}
.field{ text-align:left; margin-bottom:14px;}
.field label{ display:block; font-size:12px; color:var(--text-muted); margin-bottom:6px;}
.field input{
  width:100%; padding:10px 12px; border-radius:8px;
  border:1px solid var(--border); background:var(--bg-elev-2); color:var(--text);
  font-size:14px; outline:none;
}
.field input:focus{ border-color:var(--accent); }
.btn{
  border:none; border-radius:8px; padding:10px 16px; font-size:14px; font-weight:600;
  cursor:pointer; transition:transform .08s ease, filter .15s ease;
}
.btn:active{ transform:scale(0.98); }
.btn-primary{ background:var(--accent); color:#1a1208; width:100%; margin-top:6px;}
.btn-primary:hover{ filter:brightness(1.08); }
.login-error{ color:var(--bad); font-size:12.5px; min-height:16px; margin-top:10px;}

/* ---------- APP SHELL ---------- */
#app{ display:none; min-height:100vh; }
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 24px; border-bottom:1px solid var(--border); background:var(--bg-elev);
  position:sticky; top:0; z-index:20;
}
.topbar-left{ display:flex; align-items:center; gap:10px; cursor:pointer;}
.topbar-left .brand-mark{ width:32px;height:32px;margin:0;}
.topbar-left .brand-mark svg{ width:16px;height:16px;}
.topbar-title{ font-size:15px; font-weight:600; letter-spacing:0.01em;}
.topbar-title span{ color:var(--accent);}
.clock{ font-size:12.5px; color:var(--text-muted); text-align:right; line-height:1.4;}
.clock b{ color:var(--text); font-weight:600;}
.logout-btn{
  background:transparent; border:1px solid var(--border); color:var(--text-muted);
  padding:7px 12px; border-radius:8px; font-size:12.5px; cursor:pointer; margin-left:14px;
}
.logout-btn:hover{ color:var(--text); border-color:var(--text-faint);}
.sync-badge{ font-size:10.5px; margin-top:3px; display:inline-flex; align-items:center; gap:4px; }
.sync-badge::before{ content:''; width:6px; height:6px; border-radius:50%; display:inline-block;}
.sync-badge.local{ color:var(--text-faint); }
.sync-badge.local::before{ background:var(--text-faint); }
.sync-badge.ok{ color:var(--good); }
.sync-badge.ok::before{ background:var(--good); }
.sync-badge.error{ color:var(--bad); }
.sync-badge.error::before{ background:var(--bad); }
.settings-steps{ font-size:12.5px; color:var(--text-muted); line-height:1.6; padding-left:18px; margin-bottom:14px;}
.code-box{
  background:var(--bg-elev-2); border:1px solid var(--border); border-radius:8px; padding:10px;
  font-family:monospace; font-size:11px; color:var(--text-muted); max-height:180px; overflow-y:auto;
  white-space:pre-wrap; margin-bottom:8px;
}
.settings-tabs{ display:flex; gap:6px; border-bottom:1px solid var(--border); margin-bottom:18px; }
.settings-tabs button{
  background:transparent; border:none; color:var(--text-muted); padding:8px 4px; font-size:12.5px;
  font-weight:600; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;
}
.settings-tabs button.active{ color:var(--accent-soft); border-bottom-color:var(--accent); }
.theme-toggle{ display:flex; gap:10px; }
.theme-opt{
  flex:1; border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center;
  cursor:pointer; background:var(--bg-elev-2); font-size:12.5px; font-weight:600;
}
.theme-opt.active{ border-color:var(--accent); color:var(--accent-soft); }
.theme-opt .swatch{ width:100%; height:34px; border-radius:6px; margin-bottom:8px; border:1px solid var(--border);}
.user-row{
  display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);
}
.user-row:last-child{ border-bottom:none; }
.user-row .uname{ font-weight:600; font-size:13.5px; }
.user-row .utag{ font-size:10.5px; color:var(--text-faint); }

main{ max-width:1080px; margin:0 auto; padding:28px 20px 60px;}

/* ---------- HOME ---------- */
.home-greeting{ margin-bottom:22px;}
.home-greeting h2{ font-size:22px; font-weight:600;}
.home-greeting p{ color:var(--text-muted); font-size:13.5px; margin-top:4px;}

.stat-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:12px; margin-bottom:26px;
}
.stat-card{
  background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 18px;
}
.stat-card .label{ font-size:11.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-faint); margin-bottom:8px;}
.stat-card .value{ font-size:24px; font-weight:700; }
.stat-card .value.accent{ color:var(--accent-soft); }
.stat-card .value.good{ color:var(--good); }
.stat-card .value.bad{ color:var(--bad); }
.stat-card .sub{ font-size:11.5px; color:var(--text-faint); margin-top:4px;}

.panels-row{ display:grid; grid-template-columns:1.3fr 1fr; gap:14px; margin-bottom:30px;}
@media(max-width:760px){ .panels-row{ grid-template-columns:1fr; } }
.panel{
  background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px 18px 8px;
}
.panel h3{ font-size:13px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between;}
.panel h3 .count{ font-size:11px; color:var(--text-faint); font-weight:400;}
.list-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; border-bottom:1px solid var(--border); font-size:13px;
}
.list-row:last-child{ border-bottom:none; }
.list-row .name{ font-weight:600; }
.list-row .meta{ color:var(--text-muted); font-size:12px;}
.pill{
  font-size:10.5px; padding:2px 8px; border-radius:20px; font-weight:600; letter-spacing:.02em;
}
.pill-good{ background:var(--good-dim); color:var(--good);}
.pill-bad{ background:var(--bad-dim); color:var(--bad);}
.pill-accent{ background:var(--accent-dim); color:var(--accent-soft);}
.empty-note{ color:var(--text-faint); font-size:12.5px; padding:14px 0; text-align:center;}

.nav-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px;
}
.nav-btn{
  background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 16px; display:flex; flex-direction:column; align-items:flex-start; gap:12px;
  cursor:pointer; text-align:left; transition:border-color .15s ease, transform .1s ease;
}
.nav-btn:hover{ border-color:var(--accent); transform:translateY(-2px); }
.nav-btn .icon-wrap{
  width:38px;height:38px;border-radius:9px;background:var(--accent-dim);
  display:flex;align-items:center;justify-content:center;
}
.nav-btn .icon-wrap svg{ width:19px;height:19px; stroke:var(--accent-soft); }
.nav-btn .nb-title{ font-size:14px; font-weight:600;}
.nav-btn .nb-sub{ font-size:11.5px; color:var(--text-faint); margin-top:-8px;}

/* ---------- SECTION VIEWS ---------- */
.section-header{
  display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; flex-wrap:wrap;
}
.section-header h2{ font-size:19px; font-weight:600; display:flex; align-items:center; gap:10px;}
.back-btn{
  background:transparent; border:1px solid var(--border); color:var(--text-muted);
  width:32px;height:32px;border-radius:8px; cursor:pointer; display:flex;align-items:center;justify-content:center;
}
.back-btn:hover{ color:var(--text); border-color:var(--text-faint); }
.header-actions{ display:flex; gap:8px; flex-wrap:wrap;}
.btn-secondary{
  background:var(--bg-elev-2); border:1px solid var(--border); color:var(--text);
}
.btn-secondary:hover{ border-color:var(--text-faint); }
.btn-accent{ background:var(--accent); color:#1a1208; }
.btn-accent:hover{ filter:brightness(1.08); }
.btn-danger-outline{ background:transparent; border:1px solid var(--bad); color:var(--bad); }
.btn-sm{ padding:6px 12px; font-size:12.5px; }

.card{
  background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px; margin-bottom:16px;
}
.card h4{ font-size:13px; font-weight:600; margin-bottom:14px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em;}

.form-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
.form-grid.full{ grid-template-columns:1fr; }
.field-inline label{ display:block; font-size:11.5px; color:var(--text-muted); margin-bottom:6px;}
.field-inline input, .field-inline select, .field-inline textarea{
  width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--border);
  background:var(--bg-elev-2); color:var(--text); font-size:13.5px; outline:none;
}
.field-inline textarea{ resize:vertical; min-height:60px;}
.field-inline input:focus, .field-inline select:focus, .field-inline textarea:focus{ border-color:var(--accent); }
.seg-toggle{ display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden;}
.seg-toggle button{
  flex:1; background:var(--bg-elev-2); border:none; color:var(--text-muted); padding:9px 8px; font-size:12.5px;
  cursor:pointer; border-right:1px solid var(--border); font-weight:600;
}
.seg-toggle button:last-child{ border-right:none; }
.seg-toggle button.active{ background:var(--accent); color:#1a1208; }

table{ width:100%; border-collapse:collapse; font-size:13px; }
thead th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em;
  color:var(--text-faint); padding:8px 10px; border-bottom:1px solid var(--border); font-weight:600;
}
tbody td{ padding:10px; border-bottom:1px solid var(--border); vertical-align:middle;}
tbody tr:last-child td{ border-bottom:none; }
tbody tr:hover{ background:rgba(255,255,255,0.02); }
.icon-btn{
  background:transparent; border:1px solid var(--border); color:var(--text-muted);
  width:28px;height:28px;border-radius:6px; cursor:pointer; display:inline-flex;align-items:center;justify-content:center;
}
.icon-btn:hover{ color:var(--text); border-color:var(--text-faint);}
.icon-btn.danger:hover{ color:var(--bad); border-color:var(--bad);}
.table-wrap{ overflow-x:auto; }
.table-scroll-note{ font-size:11px; color:var(--text-faint); margin-top:8px;}

.cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.cal-dow{ text-align:center; font-size:11px; color:var(--text-faint); padding-bottom:6px; text-transform:uppercase; letter-spacing:.04em;}
.cal-cell{
  min-height:78px; border:1px solid var(--border); border-radius:8px; padding:6px;
  background:var(--bg-elev-2); font-size:11.5px; cursor:pointer; position:relative;
}
.cal-cell.other-month{ opacity:0.3; }
.cal-cell.today{ border-color:var(--accent); }
.cal-cell .daynum{ font-weight:700; font-size:12px; margin-bottom:4px;}
.cal-cell .evt{
  background:var(--accent-dim); color:var(--accent-soft); border-radius:4px; padding:1px 5px;
  font-size:10px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.cal-nav{ display:flex; align-items:center; gap:10px; }
.cal-nav .month-label{ font-weight:600; font-size:14px; min-width:150px; text-align:center;}

.modal-overlay{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:100;
  align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open{ display:flex; }
.modal{
  background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius);
  width:100%; max-width:440px; max-height:88vh; overflow-y:auto; padding:22px;
}
.modal h3{ font-size:15px; font-weight:600; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;}
.modal .close-x{ background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;}
.modal .field-inline{ margin-bottom:12px; }
.modal-actions{ display:flex; gap:8px; margin-top:16px; }
.modal-actions .btn{ flex:1; }
.gcal-link{
  display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--accent-soft);
  text-decoration:none; margin-top:10px;
}

.stat-bars{ display:flex; flex-direction:column; gap:10px; }
.stat-bar-row{ display:flex; align-items:center; gap:10px; font-size:12.5px;}
.stat-bar-row .lbl{ width:88px; color:var(--text-muted); flex-shrink:0;}
.stat-bar-track{ flex:1; height:10px; background:var(--bg-elev-2); border-radius:6px; overflow:hidden;}
.stat-bar-fill{ height:100%; background:linear-gradient(90deg,var(--accent),var(--accent-soft)); }
.stat-bar-row .val{ width:80px; text-align:right; font-weight:600; flex-shrink:0;}

.empty-state{ text-align:center; padding:36px 12px; color:var(--text-faint); font-size:13px;}
.empty-state svg{ width:34px;height:34px; stroke:var(--text-faint); margin-bottom:10px;}

.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--bg-elev-2); border:1px solid var(--border); color:var(--text);
  padding:10px 18px; border-radius:8px; font-size:13px; opacity:0; pointer-events:none;
  transition:all .25s ease; z-index:200; box-shadow:0 10px 30px -10px rgba(0,0,0,0.6);
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </div>
    <h1>Sunset Tattoo</h1>
    <div class="sub">Gestión de cobros y clientes</div>
    <div class="field">
      <label for="user-input">Usuario</label>
      <input id="user-input" type="text" autocomplete="username" placeholder="usuario">
    </div>
    <div class="field">
      <label for="pass-input">Contraseña</label>
      <input id="pass-input" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="login-btn">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left" id="go-home-topbar">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </div>
      <div class="topbar-title">Sunset <span>Tattoo</span></div>
    </div>
    <div style="display:flex; align-items:center; gap:2px;">
      <div style="text-align:right; margin-right:8px;">
        <div class="clock" id="clock"></div>
        <div class="sync-badge local" id="sync-badge">Guardado en la página</div>
      </div>
      <button class="logout-btn" id="settings-btn" title="Configuración" style="padding:7px 10px;">⚙</button>
      <button class="logout-btn" id="logout-btn">Salir</button>
    </div>
  </div>
  <main id="main-content"></main>
</div>

<div class="toast" id="toast"></div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-body"></div>
</div>

<script>
/* ============ ICONS ============ */
const ICONS = {
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  users:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  cash:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M6 10v.01M18 14v.01"/></svg>',
  box:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8M12 13v8"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',

/* ============ ADAPTADOR DE ALMACENAMIENTO ============ */
/* Usa window.storage si existe (dentro de Claude); si la página se aloja afuera
   (GitHub Pages, Netlify, etc.) usa localStorage del navegador automáticamente. */
const HAS_CLAUDE_STORAGE = (typeof window.storage !== 'undefined');
async function storageGet(key){
  if(HAS_CLAUDE_STORAGE){
    try{ return await window.storage.get(key, false); }catch(e){ return null; }
  }
  const v = localStorage.getItem(key);
  return v ? { key, value:v, shared:false } : null;
}
async function storageSet(key, value){
  if(HAS_CLAUDE_STORAGE){
    try{ return await window.storage.set(key, value, false); }catch(e){ return null; }
  }
  localStorage.setItem(key, value);
  return { key, value, shared:false };
}

/* ============ STATE & STORAGE ============ */
const STORAGE_KEY = 'sunset-tattoo-data';
const USERS_KEY = 'sunset-tattoo-users';
const APPEARANCE_KEY = 'sunset-tattoo-appearance';

/* Pegá acá la URL de tu Apps Script (termina en /exec) UNA sola vez, después
   de configurarla en Google Sheets, y volvé a publicar el archivo. Es la
   ÚNICA forma de fijarla: no hay ninguna pantalla dentro de la app para
   cambiarla, así queda igual para todos los navegadores y dispositivos y
   nadie puede desvincularla ni apuntarla a otra planilla por error. */
const DEFAULT_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxOvmoH4UAS5zu4AeFWdIdjv6iwjEimHZiBYWiO0Cn0BSMC7uAPqHY_vHdR3488GTiK8A/exec';

let DATA = { clientes: [], caja: [], inventario: [] };
let CONFIG = { sheetsUrl: DEFAULT_SHEETS_URL };
let USERS = [];
let currentUser = null;
let APPEARANCE = { font:'Calibri, Candara, "Segoe UI", Optima, Arial, sans-serif', fontLabel:'Calibri', size:'md', theme:'dark' };
let currentView = 'home';
let syncStatus = 'local'; // 'local' | 'synced' | 'error' | 'syncing'

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function loadUsers(){
  // copia local rápida primero (por si no hay conexión)
  const res = await storageGet(USERS_KEY);
  if(res && res.value){
    try{ USERS = JSON.parse(res.value); }catch(e){ USERS = []; }
  }

  // si hay Google Sheets vinculado, la lista real de usuarios vive ahí
  if(CONFIG.sheetsUrl){
    try{
      const remote = await fetchFromSheets();
      if(remote && remote.usuarios && remote.usuarios.length){
        USERS = remote.usuarios;
        await storageSet(USERS_KEY, JSON.stringify(USERS));
      }
    }catch(e){ /* sin conexión: seguimos con la copia local */ }
  }

  if(!USERS || !USERS.length){
    USERS = [{ id: uid(), usuario:'sunsesito', password:'fineline' }];
    await saveUsers();
  }
}
async function saveUsers(){
  try{ await storageSet(USERS_KEY, JSON.stringify(USERS)); }
  catch(e){ showToast('No se pudo guardar los usuarios localmente.'); }

  if(CONFIG.sheetsUrl){
    try{ await postUsersToSheets(USERS); }
    catch(e){ showToast('Usuarios guardados en este navegador, pero no se pudo sincronizar con Google Sheets.'); }
  }
}

async function loadAppearance(){
  const res = await storageGet(APPEARANCE_KEY);
  if(res && res.value){
    try{ APPEARANCE = Object.assign(APPEARANCE, JSON.parse(res.value)); }catch(e){}
  }
  applyAppearance();
}
async function saveAppearance(){
  try{ await storageSet(APPEARANCE_KEY, JSON.stringify(APPEARANCE)); }
  catch(e){ showToast('No se pudo guardar la apariencia.'); }
  applyAppearance();
}
function applyAppearance(){
  document.documentElement.setAttribute('data-theme', APPEARANCE.theme);
  document.documentElement.style.setProperty('--font-family', APPEARANCE.font);
  const zoomMap = { sm:'90%', md:'100%', lg:'115%' };
  document.body.style.zoom = zoomMap[APPEARANCE.size] || '100%';
}

async function loadData(){
  // 1) copia local rápida
  const res = await storageGet(STORAGE_KEY);
  if(res && res.value){
    try{
      const local = JSON.parse(res.value);
      DATA.clientes = local.clientes || [];
      DATA.caja = local.caja || [];
      DATA.inventario = local.inventario || [];
    }catch(e){}
  }

  // 2) si hay Google Sheets vinculado, traemos la versión real
  if(CONFIG.sheetsUrl){
    syncStatus = 'syncing';
    try{
      const remote = await fetchFromSheets();
      if(remote){
        DATA.clientes = remote.clientes || [];
        DATA.caja = remote.caja || [];
        DATA.inventario = remote.inventario || [];
        syncStatus = 'synced';
        await storageSet(STORAGE_KEY, JSON.stringify(DATA));
      }
    }catch(e){
      syncStatus = 'error';
      showToast('No se pudo conectar con Google Sheets. Usando la última copia guardada.');
    }
  }
}

async function saveData(){
  try{
    await storageSet(STORAGE_KEY, JSON.stringify(DATA));
  }catch(e){ showToast('No se pudo guardar localmente. Reintentá.'); }

  if(CONFIG.sheetsUrl){
    syncStatus = 'syncing'; renderSyncBadge();
    try{
      await postToSheets(DATA);
      syncStatus = 'synced';
    }catch(e){
      syncStatus = 'error';
      showToast('Se guardó en la página, pero no se pudo sincronizar con Google Sheets.');
    }
    renderSyncBadge();
  }
}

async function fetchFromSheets(){
  const res = await fetch(CONFIG.sheetsUrl, { method:'GET' });
  if(!res.ok) throw new Error('fetch failed');
  const json = await res.json();
  const normNum = (v)=> v===''||v===undefined||v===null ? 0 : Number(v);
  return {
    clientes: (json.clientes||[]).map(c=>({ id:String(c.id||uid()), nombre:c.nombre||'', telefono:c.telefono||'', notas:c.notas||'', debe:normNum(c.debe) })),
    caja: (json.caja||[]).map(m=>({ id:String(m.id||uid()), tipo:m.tipo||'ingreso', metodo:m.metodo||'efectivo', estado:m.estado||'total', monto:normNum(m.monto), adeudado:normNum(m.adeudado), fecha:String(m.fecha||'').slice(0,10), cliente:m.cliente||'', notas:m.notas||'' })),
    inventario: (json.inventario||[]).map(p=>({ id:String(p.id||uid()), nombre:p.nombre||'', cantidad:normNum(p.cantidad), unidad:p.unidad||'', precio:normNum(p.precio), notas:p.notas||'' })),
    usuarios: (json.usuarios||[]).map(u=>({ id:String(u.id||uid()), usuario:u.usuario||'', password:String(u.password||'') })),
  };
}
async function postToSheets(data){
  const res = await fetch(CONFIG.sheetsUrl, { method:'POST', body: JSON.stringify(data) });
  if(!res.ok) throw new Error('post failed');
}
async function postUsersToSheets(users){
  const res = await fetch(CONFIG.sheetsUrl, { method:'POST', body: JSON.stringify({ usuarios: users }) });
  if(!res.ok) throw new Error('post users failed');
}

function renderSyncBadge(){
  const el = document.getElementById('sync-badge');
  if(!el) return;
  if(!CONFIG.sheetsUrl){ el.textContent = 'Guardado en la página'; el.className='sync-badge local'; return; }
  if(syncStatus==='synced'){ el.textContent = 'Sincronizado con Google Sheets'; el.className='sync-badge ok'; }
  else if(syncStatus==='syncing'){ el.textContent = 'Sincronizando...'; el.className='sync-badge local'; }
  else { el.textContent = 'Sin conexión con Sheets'; el.className='sync-badge error'; }
}

function showToast(msg){

}

/* ============ HELPERS ============ */
function fmtMoney(n){
  return '$' + Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:0, maximumFractionDigits:0});
}
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function isSameDay(iso, date){ return iso === date.toISOString().slice(0,10); }
function startOfWeek(d){
  const dt = new Date(d); const day = dt.getDay(); const diff = dt.getDate() - day + (day===0?-6:1);
  dt.setDate(diff); dt.setHours(0,0,0,0); return dt;
}
function inRange(iso, start, end){ const t = new Date(iso+'T00:00:00'); return t>=start && t<=end; }

function clienteDebe(clienteId){
  // suma egresos pendientes: monto adeudado tracked directly on cliente.debe
  const c = DATA.clientes.find(c=>c.id===clienteId);
  return c ? Number(c.debe||0) : 0;
}

function computeIncome(){
  const now = new Date();
  const todayStart = new Date(now.toDateString());
  const weekStart = startOfWeek(now);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  let today=0, week=0, month=0;
  DATA.caja.forEach(m=>{
    if(m.tipo !== 'ingreso') return;
    const t = new Date(m.fecha+'T00:00:00');
    if(t>=todayStart) today += Number(m.monto);
    if(t>=weekStart) week += Number(m.monto);
    if(t>=monthStart) month += Number(m.monto);
  });
  return {today, week, month};
}

        <button type="submit" class="btn btn-accent">Guardar movimiento</button>
      </div>
    </form>
  `;
  openModal();
  setupSegToggle('tipo-toggle');
  setupSegToggle('metodo-toggle');
  setupSegToggle('estado-toggle');
  const form = document.getElementById('mov-form');
  // solo tiene sentido "parcial" para ingresos
  document.getElementById('tipo-toggle').addEventListener('click', ()=>{
    const tipo = form.querySelector('[name=tipo]').value;
    document.getElementById('estado-wrap').style.display = tipo==='egreso' ? 'none':'block';
    if(tipo==='egreso'){
      form.querySelector('[name=estado]').value = 'total';
      document.getElementById('adeudado-wrap').style.display = 'none';
    }
  });
  document.getElementById('estado-toggle').addEventListener('input', ()=>{
    const estado = form.querySelector('[name=estado]').value;
    const parcial = estado === 'parcial';
    document.getElementById('adeudado-wrap').style.display = parcial ? 'block' : 'none';
    document.getElementById('cliente-label').textContent = parcial ? 'Cliente (requerido para registrar la deuda)' : 'Cliente (opcional)';
    form.querySelector('[name=adeudado]').required = parcial;
    form.querySelector('[name=cliente]').required = parcial;
  });
  form.addEventListener('submit', e=>{
    e.preventDefault();
    const f = new FormData(form);
    const estado = f.get('estado');
    const clienteNombre = (f.get('cliente')||'').trim();
    const adeudado = Number(f.get('adeudado')||0);

    if(estado==='parcial' && (!clienteNombre || adeudado<=0)){
      showToast('Para un pago parcial indicá el cliente y el monto adeudado.');
      return;
    }

    const mov = {
      id: uid(),
      tipo: f.get('tipo'),
      metodo: f.get('metodo'),
      estado: estado,
      monto: Number(f.get('monto')),
      adeudado: estado==='parcial' ? adeudado : 0,
      fecha: f.get('fecha'),
      cliente: clienteNombre,
      notas: (f.get('notas')||'').trim(),
    };
    DATA.caja.push(mov);

    if(estado==='parcial' && clienteNombre){
      const existente = DATA.clientes.find(c=> c.nombre.trim().toLowerCase() === clienteNombre.toLowerCase());
      if(existente){
        existente.debe = Number(existente.debe||0) + adeudado;
      } else {
        DATA.clientes.push({ id: uid(), nombre: clienteNombre, telefono:'', notas:'', debe: adeudado });
      }
      showToast(`Movimiento guardado. Se cargaron ${fmtMoney(adeudado)} de deuda a ${clienteNombre}.`);
    } else {
      showToast('Movimiento guardado.');
    }
    saveData(); closeModal(); render();
  });
}
function setupSegToggle(id){
  const wrap = document.getElementById(id);

  wrap.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>{

}

/* ============ ESTADISTICAS ============ */
function viewEstadisticas(){
  const ingresos = DATA.caja.filter(m=>m.tipo==='ingreso');
  const egresos = DATA.caja.filter(m=>m.tipo==='egreso');
  const totalIngresos = ingresos.reduce((s,m)=>s+Number(m.monto),0);
  const totalEgresos = egresos.reduce((s,m)=>s+Number(m.monto),0);
  const porMetodo = {efectivo:0, transferencia:0};
  ingresos.forEach(m=> porMetodo[m.metodo] = (porMetodo[m.metodo]||0) + Number(m.monto));
  const deudores = DATA.clientes.filter(c=>Number(c.debe||0)>0).sort((a,b)=>b.debe-a.debe).slice(0,6);

  const maxMet = Math.max(1, ...Object.values(porMetodo));
  const maxDeuda = Math.max(1, ...deudores.map(c=>Number(c.debe||0)));

  // últimos 7 días
  const days = [];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(d); }
  const dayTotals = days.map(d=>{
    const iso = d.toISOString().slice(0,10);
    return DATA.caja.filter(m=>m.tipo==='ingreso' && m.fecha===iso).reduce((s,m)=>s+Number(m.monto),0);
  });
  const maxDay = Math.max(1, ...dayTotals);

  return `
  ${sectionHeader('Estadísticas','chart','')}
  <div class="stat-grid" style="margin-bottom:16px;">
    <div class="stat-card"><div class="label">Total ingresos</div><div class="value good">${fmtMoney(totalIngresos)}</div></div>
    <div class="stat-card"><div class="label">Total egresos</div><div class="value bad">${fmtMoney(totalEgresos)}</div></div>
    <div class="stat-card"><div class="label">Balance</div><div class="value accent">${fmtMoney(totalIngresos-totalEgresos)}</div></div>
  </div>

  <div class="panels-row">
    <div class="panel">
      <h3>Últimos 7 días (ingresos)</h3>
      <div class="stat-bars">
        ${days.map((d,i)=>`
          <div class="stat-bar-row">
            <div class="lbl">${d.toLocaleDateString('es-AR',{weekday:'short', day:'numeric'})}</div>
            <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(dayTotals[i]/maxDay*100)}%"></div></div>
            <div class="val">${fmtMoney(dayTotals[i])}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="panel">
      <h3>Por método de pago</h3>
      <div class="stat-bars">
        ${Object.entries(porMetodo).map(([k,v])=>`
          <div class="stat-bar-row">
            <div class="lbl">${k==='efectivo'?'Efectivo':'Transferencia'}</div>
            <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(v/maxMet*100)}%"></div></div>
            <div class="val">${fmtMoney(v)}</div>
          </div>`).join('')}
      </div>
      <h3 style="margin-top:20px;">Clientes con más deuda</h3>
      <div class="stat-bars">
        ${deudores.length ? deudores.map(c=>`
          <div class="stat-bar-row">
            <div class="lbl">${escapeHtml(c.nombre)}</div>
            <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(c.debe/maxDeuda*100)}%; background:linear-gradient(90deg,var(--bad),#e28a80);"></div></div>
            <div class="val">${fmtMoney(c.debe)}</div>
          </div>`).join('') : `<div class="empty-note">Nadie te debe plata. 🎉</div>`}
      </div>
    </div>
  </div>
  `;
}

const APPS_SCRIPT_CODE = `function doGet(e) {
  return ContentService.createTextOutput(JSON.stringify(getAllData()))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var payload = JSON.parse(e.postData.contents);
  if (payload.usuarios !== undefined) {
    objectsToSheet(getSheet('Usuarios'), ['id','usuario','password'], payload.usuarios || []);
  }
  if (payload.clientes !== undefined || payload.caja !== undefined || payload.inventario !== undefined) {
    saveAllData(payload);
  }
  return ContentService.createTextOutput(JSON.stringify({ok:true}))
    .setMimeType(ContentService.MimeType.JSON);
}

function getSheet(name) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = ss.getSheetByName(name);
  if (!sh) sh = ss.insertSheet(name);
  return sh;
}

function normalizeValue(v) {
  if (Object.prototype.toString.call(v) === '[object Date]') {
    return Utilities.formatDate(v, Session.getScriptTimeZone(), 'yyyy-MM-dd');
  }
  return v;
}

function sheetToObjects(sh) {
  var values = sh.getDataRange().getValues();
  if (values.length < 2) return [];
  var headers = values[0];
  var rows = values.slice(1).filter(function(r){ return r.join('') !== ''; });
  return rows.map(function(r){
    var obj = {};
    headers.forEach(function(h, i){ obj[h] = normalizeValue(r[i]); });
    return obj;
  });
}

function objectsToSheet(sh, headers, objects) {
  sh.clearContents();
  sh.getRange(1,1,1,headers.length).setValues([headers]);
  if (objects.length) {
    var dateCols = [];
    headers.forEach(function(h,i){ if (h === 'fecha') dateCols.push(i+1); });
    dateCols.forEach(function(c){ sh.getRange(2, c, objects.length, 1).setNumberFormat('@'); });
    var rows = objects.map(function(obj){
      return headers.map(function(h){ return obj[h] !== undefined ? obj[h] : ''; });
    });
    sh.getRange(2,1,rows.length,headers.length).setValues(rows);
  }
}

function getAllData() {
  return {
    clientes: sheetToObjects(getSheet('Clientes')),
    caja: sheetToObjects(getSheet('Caja')),
    inventario: sheetToObjects(getSheet('Inventario')),
    usuarios: sheetToObjects(getSheet('Usuarios'))
  };
}

function saveAllData(data) {
  objectsToSheet(getSheet('Clientes'), ['id','nombre','telefono','notas','debe'], data.clientes || []);
  objectsToSheet(getSheet('Caja'), ['id','tipo','metodo','estado','monto','adeudado','fecha','cliente','notas'], data.caja || []);
  objectsToSheet(getSheet('Inventario'), ['id','nombre','cantidad','unidad','precio','notas'], data.inventario || []);
}`;

/* ============ EVENT DELEGATION ============ */
/* data-nav (botón "atrás"/navegación) y data-close-modal (la "X" de los modales)
   se manejan con UN SOLO listener delegado en document, agregado una vez al
   arrancar la página (ver más abajo). Así funcionan siempre, sin importar
   cuándo se creó el botón en el HTML (incluidos los modales que se generan
   dinámicamente: cliente, movimiento, producto, configuración, usuario). */
function attachHandlers(){
  // Clientes
  const addClienteBtn = document.getElementById('add-cliente-btn');

  }));
  const expClientes = document.getElementById('export-clientes-btn');
  if(expClientes) expClientes.addEventListener('click', ()=> exportToExcel(
    DATA.clientes.map(c=>({Nombre:c.nombre, Teléfono:c.telefono||'', Notas:c.notas||'', Debe:c.debe||0})),
    'clientes_sunset_tattoo.xlsx','Clientes'));

  // Caja
  const addMovBtn = document.getElementById('add-mov-btn');
  if(addMovBtn) addMovBtn.addEventListener('click', openMovModal);
  document.querySelectorAll('[data-del-mov]').forEach(el=> el.addEventListener('click', ()=>{
    DATA.caja = DATA.caja.filter(m=>m.id!==el.dataset.delMov);
    saveData(); render(); showToast('Movimiento eliminado.');
  }));
  const expCaja = document.getElementById('export-caja-btn');
  if(expCaja) expCaja.addEventListener('click', ()=> exportToExcel(
    DATA.caja.map(m=>({Fecha:m.fecha, Tipo:m.tipo, Método:m.metodo, Estado:m.estado, Monto:m.monto, Adeudado:m.adeudado||0, Cliente:m.cliente||'', Notas:m.notas||''})),
    'caja_sunset_tattoo.xlsx','Caja'));

  // Inventario
  const addItemBtn = document.getElementById('add-item-btn');
  if(addItemBtn) addItemBtn.addEventListener('click', ()=> openItemModal(null));
  document.querySelectorAll('[data-edit-item]').forEach(el=> el.addEventListener('click', ()=> openItemModal(el.dataset.editItem)));
  document.querySelectorAll('[data-del-item]').forEach(el=> el.addEventListener('click', ()=>{
    DATA.inventario = DATA.inventario.filter(p=>p.id!==el.dataset.delItem);
    saveData(); render(); showToast('Producto eliminado.');
  }));
  const expInv = document.getElementById('export-inv-btn');
  if(expInv) expInv.addEventListener('click', ()=> exportToExcel(
    DATA.inventario.map(p=>({Producto:p.nombre, Cantidad:p.cantidad, Unidad:p.unidad||'', Precio:p.precio||0, Notas:p.notas||''})),
    'inventario_sunset_tattoo.xlsx','Inventario'));

  const settingsBtn = document.getElementById('settings-btn');
  if(settingsBtn) settingsBtn.addEventListener('click', openSettingsModal);
}

/* ============ BOOT ============ */
async function boot(){
  await loadData();
  tickClock();
  setInterval(tickClock, 30000);
  render();
}

/* Se ejecuta apenas carga la página, antes del login: apariencia y usuarios */
async function preInit(){
  await loadAppearance();
  await loadUsers();
}
preInit();
</script>
</body>
</html>
